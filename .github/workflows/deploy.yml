name: Deploy to Production

on:
  push:
    branches:
      - main # This triggers the workflow only when you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Execute Deployment Commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            echo "=== SYSTEM DIAGNOSTICS ==="
            whoami
            echo "$PATH"
            docker --version
            docker compose version || echo "docker compose command failed"
            echo "=== SEARCHING FOR PLUGIN ==="
            ls -l /usr/lib/docker/cli-plugins 2>/dev/null || echo "Not in /usr/lib"
            ls -l /usr/local/lib/docker/cli-plugins 2>/dev/null || echo "Not in /usr/local/lib"
            ls -l /usr/libexec/docker/cli-plugins 2>/dev/null || echo "Not in /usr/libexec"
            find /usr -path '*cli-plugins*' 2>/dev/null
            echo "=========================="