services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args: 
        NEXT_PUBLIC_GAME_SERVER_URL: ${NEXT_PUBLIC_GAME_SERVER_URL}
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_GAME_SERVER_URL=${NEXT_PUBLIC_GAME_SERVER_URL}
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - frontend
    deploy: #LIMITS AND RESERVATIONS ACCORDING TO HOSTINGER KVM2 PLAN PURCHASED
      resources:
        limits:
          cpus: '0.75'
          memory: 1024M
        reservations:
          cpus: '0.10'
          memory: 256M

  game-server:
    build:
      context: .
      dockerfile: apps/game-server/Dockerfile
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - DATABASE_URL=${DATABASE_URL}
    volumes:
      - ./server-logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "3001:3001"
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy: #LIMITS AND RESERVATIONS ACCORDING TO HOSTINGER KVM2 PLAN PURCHASED
      resources:
        limits:
          cpus: '1.0'
          memory: 2048M
        reservations:
          cpus: '0.25'
          memory: 512M

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./worker-logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend
    deploy: # LIMITS AND RESERVATIONS ACCORDING TO HOSTINGER KVM2 PLAN PURCHASED
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 128M

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scribblitz_db}
      POSTGRES_USER: ${POSTGRES_USER:-scribblitz_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scribblitz_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-scribblitz_user} -d $${POSTGRES_DB:-scribblitz_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

networks:
  frontend:
  backend:

volumes:
  postgres_data:
  redis_data: